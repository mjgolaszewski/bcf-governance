name: governance-mutants-weekly

on:
  workflow_dispatch:
  schedule:
    - cron: "41 4 * * 0"

permissions:
  contents: read

jobs:
  full-mutants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install governance dependencies
        run: python -m pip install -r requirements-governance.txt
      - name: Run full validator mutant profile
        run: python .github/scripts/run_validator_mutants.py --profile full
