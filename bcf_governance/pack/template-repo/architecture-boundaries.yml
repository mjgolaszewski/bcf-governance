document:
  kind: architecture_boundary_rules
  name: "{{PROJECT_NAME}} Architecture Boundary Rules"
  id: "{{PROJECT_ID}}-architecture-boundaries"
  version: 1.0.0
  generated_at_utc: "{{DATE}}T00:00:00Z"
  status: active
  path: architecture-boundaries.yml
architecture:
  source_roots:
    - backend/src
  mandatory_rule_gate_policy:
    every_mandatory_rule_has_executable_gate: true
    human_review_only_allowed_with_rationale: true
    human_review_only_rules: []
  production_module_policy:
    max_loc: 800
    excluded_path_tokens:
      - generated
      - migrations
      - migration
      - vendor
      - fixtures
      - snapshots
      - testdata
      - tests
    excluded_file_suffixes:
      - _pb2.py
      - _pb2_grpc.py
  bounded_contexts:
    required: true
    context_root_tokens:
      - domain
      - domains
      - feature
      - features
      - context
      - contexts
      - bounded_context
      - bounded_contexts
      - infra
      - infrastructure
      - adapter
      - adapters
    shared_context_tokens:
      - shared
      - shared_kernel
  layer_membership_policy:
    exactly_one_layer: true
  context_membership_policy:
    exactly_one_context: true
  cqrs_policy:
    command_path_tokens:
      - command
      - commands
    query_path_tokens:
      - query
      - queries
    read_model_tokens:
      - read_model
      - read_models
      - view_model
      - view_models
      - projection
      - projections
    write_method_names:
      - bulk_save_objects
      - commit
      - create
      - delete
      - enqueue
      - execute_write
      - flush
      - merge
      - publish
      - remove
      - save
      - update
  thin_router_policy:
    max_branch_nodes: 4
    max_loop_nodes: 0
    delegate_call_name_tokens:
      - command
      - query
      - handler
      - use_case
      - service
  duplication_policy:
    enabled: true
    min_duplicate_lines: 12
    scoped_to_bounded_context: true
    allowed_cross_context_duplication: true
  shared_abstraction_policy:
    shared_path_tokens:
      - common
      - helpers
      - shared
      - utils
    min_real_call_sites: 2
    required_metadata:
      - owning_layer
      - owning_context_or_shared_kernel
      - rationale
      - tests
  layers:
    domain:
      path_tokens:
        - domain
      required: true
      forbidden_import_prefixes:
        - boto3
        - botocore
        - fastapi
        - google.cloud
        - grpc
        - httpx
        - opentelemetry
        - psycopg
        - requests
        - redis
        - sentry_sdk
        - sqlalchemy
        - pydantic_settings
      forbidden_layer_imports:
        - use_cases
        - routers
        - infrastructure
        - ports
      forbidden_import_names: []
    use_cases:
      path_tokens:
        - use_case
        - use_cases
        - commands
        - queries
        - handlers
        - application
      required: true
      forbidden_import_prefixes:
        - fastapi
        - sqlalchemy
        - requests
        - httpx
        - opentelemetry
        - psycopg
        - redis
        - pydantic_settings
      forbidden_layer_imports:
        - routers
        - infrastructure
      forbidden_import_names:
        - Request
        - Response
    ports:
      path_tokens:
        - ports
        - repositories
        - repos
      required: true
      forbidden_import_prefixes:
        - fastapi
        - sqlalchemy
        - psycopg
        - redis
        - requests
        - httpx
        - opentelemetry
      forbidden_layer_imports:
        - routers
        - infrastructure
      forbidden_import_names: []
    routers:
      path_tokens:
        - router
        - routers
        - http
        - api
      required: true
      forbidden_import_prefixes:
        - sqlalchemy
        - psycopg
        - redis
        - requests
        - httpx
      forbidden_layer_imports:
        - domain
        - ports
        - infrastructure
      forbidden_import_names: []
    infrastructure:
      path_tokens:
        - infra
        - infrastructure
        - adapters
      required: false
      forbidden_import_prefixes: []
      forbidden_layer_imports: []
      forbidden_import_names: []
