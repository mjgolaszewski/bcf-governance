document:
  kind: active_execution_phase_ledger
  name: "{{PROJECT_NAME}} Active Phase Ledger"
  id: "{{PROJECT_ID}}-phase-ledger"
  version: 1.0.0
  generated_at_utc: "{{DATE}}T00:00:00Z"
  status: active_phase_planned
  path: plans/phase-ledger.yml
build_plan_mandate:
  format: yaml
  required_fields:
    - tightly_scoped_deliverables
    - parallelizable_workstreams
    - hard_dependencies
    - docker_first_local_runtime
    - completeness_standard
  completeness_standard: full_completeness_for_declared_scope
active_phase:
  id: P01
  build_block: "{{BUILD_BLOCK}}"
  plan: plans/phase-01-plan.yml
  workitems: plans/phase-01-workitems.yml
  log: phases/phase-01-log.yml
  memory: MEMORY.yml
  spec: plans/product-spec.yml
  build_plan: plans/build-plan.yml
  lifecycle_status: planned
  owner: "{{PLANNER}}"
  validation_commands:
    - make governance-validate
    - make architecture-test
    - make lint
    - make typecheck
    - make test
    - make release-check
hotfix_lane:
  scaffold_script: scripts/scaffold_governance_artifacts.py
  default_mode: full
  modes:
    lite:
      allowed_when:
        - single_commit_fix
        - no_public_contract_change
        - no_security_scope_change
    full:
      required_when:
        - default_branch_red_ci
        - release_blocking_regression
        - security_or_expiring_external_breakage
  open_records: []
  remediation_history: []
operator_requirements_choices_disambiguations:
  - type: decision
    statement: all governance, memory, specs, plans, workitem ledgers, and phase logs remain YAML-native
active_delivery_priorities:
  current_tranche:
    - "{{CURRENT_TRANCHE}}"
release_trains:
  release_1:
    target_version: "0.1.0"
    status: active
    focus:
      - governed_foundation
release_readiness:
  status: initial_governed_delivery_active
  validating_command: make release-check
definition_of_ready_before_execution:
  - active phase has a plan, workitem ledger, and log
  - validation commands are listed before implementation starts
